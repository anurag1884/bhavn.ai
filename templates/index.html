<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BHAVN.ai: A Hinglish Sentiment Analyzer</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{url_for('static', filename='styles.css')}}" />

    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="{{url_for('static', filename='main.js')}}" defer></script>
  </head>

  <body
    style="background-image: url('{{url_for('static', filename='bg.jpg')}}')"
    class="bg-cover bg-center bg-no-repeat min-h-screen font-[Roboto] text-white"
  >
    <main class="flex items-center justify-center min-h-screen px-4">
      <section
        class="bg-[rgba(90,90,90,0.5)] backdrop-blur p-10 rounded-xl border border-white w-full max-w-4xl text-2xl"
      >
        <div class="flex flex-col items-center text-center space-y-2">
          <h1 class="text-4xl font-bold rainbow-text">BHAVN.ai</h1>
          <p class="text-gray-300 text-xl italic">
            A Hinglish Sentiment Analyzer
          </p>
        </div>

        <hr class="my-6 border-gray-300" />

        <div class="flex flex-col space-y-6">
          <!-- Textarea Input -->
          <textarea
            id="hinglish-textarea-id"
            placeholder="Enter Hinglish input..."
            class="resize-none h-[35vh] text-xl overflow-auto wrap-normal whitespace-pre w-full bg-white p-4 rounded-lg border-4 border-gray-300 focus:ring-blue-500 focus:border-blue-500 text-black border-gray-600 placeholder-gray-400 focus:ring-blue-500 focus:border-blue-500"
          ></textarea>

          <!-- Analyze Button -->
          <button
            onclick="processInput()"
            class="text-3xl w-full text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg px-8 py-3 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
          >
            Analyze
          </button>

          <!-- Sentiment Output -->
          <div
            id="sentiment-container-id"
            class="hidden text-2xl p-4 rounded-md border border-gray-600 bg-neutral-900 space-y-2"
          >
            <div>
              <strong>Input text:</strong> <span id="input-text-id"></span>
            </div>
            <div>
              <strong>Sentiment:</strong> <span id="sentiment-id"></span>
            </div>
            <div>
              <strong>Confidence:</strong> <span id="confidence-id"></span>
            </div>
            <div><strong>Keywords:</strong> <span id="keywords-id"></span></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
